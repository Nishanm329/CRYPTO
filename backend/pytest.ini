[pytest]
# pytest configuration for CryptoSignal AI backend

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml

# Markers for test categorization
markers =
    unit: Unit tests (fast, no I/O)
    integration: Integration tests (slower, with services)
    slow: Tests that take more than 1 second
    asyncio: Async tests

# Async support
asyncio_mode = auto

# Ignore patterns
testpaths = tests

# Minimum coverage threshold
# Set this to fail if coverage drops below threshold
# --cov-fail-under=80
