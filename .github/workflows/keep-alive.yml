name: Keep Render backend warm

# Render's free tier spins the service down after ~15 min idle, which causes a
# ~50s cold start on the next request. Pinging /health every 10 min keeps it
# warm so users always hit a hot instance.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -fsS --retry 3 --retry-delay 10 --max-time 90 \
            https://crypto-signals-fra.onrender.com/health
