# Pre-commit hooks for code quality
# Install: pip install pre-commit
# Setup: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of file
      - id: check-yaml
        name: Check YAML
        args: ["--unsafe"]
      - id: check-json
        name: Check JSON
      - id: check-merge-conflict
        name: Check merge conflicts
      - id: check-case-conflict
        name: Check case conflicts
      - id: debug-statements
        name: Check for debugger imports
      - id: mixed-line-ending
        name: Fix mixed line endings
        args: ["--fix=lf"]
      - id: check-added-large-files
        name: Check for large files
        args: ["--maxkb=1000"]
      - id: detect-private-key
        name: Detect private keys

  # Python formatting (Black)
  - repo: https://github.com/psf/black
    rev: 23.12.0
    hooks:
      - id: black
        name: Format Python (Black)
        language_version: python3.11
        files: ^backend/

  # Python import sorting (isort)
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.0
    hooks:
      - id: isort
        name: Sort Python imports
        files: ^backend/

  # Python linting (flake8)
  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        name: Lint Python (flake8)
        files: ^backend/
        args: ["--max-line-length=120", "--extend-ignore=E203,W503"]
        additional_dependencies: ["flake8-docstrings", "flake8-bugbear"]

  # Python type checking (mypy)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        name: Type check Python (mypy)
        files: ^backend/
        additional_dependencies: ["types-all"]
        args: ["--ignore-missing-imports", "--no-error-summary"]
        exclude: tests/

  # JavaScript/TypeScript formatting (Prettier)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: Format JavaScript/JSX
        files: ^frontend/
        types: [javascript, jsx]
        exclude: (node_modules|\.next)

  # JavaScript linting (ESLint)
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.55.0
    hooks:
      - id: eslint
        name: Lint JavaScript (ESLint)
        files: ^frontend/
        types: [javascript, jsx]
        additional_dependencies: ["eslint", "eslint-config-next"]
        exclude: (node_modules|\.next)

  # YAML formatting
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.11.0
    hooks:
      - id: pretty-format-yaml
        name: Format YAML
        args: ["--autofix"]

  # Docker linting
  - repo: https://github.com/hadialqattan/pre-commit-docker
    rev: v2.1.1
    hooks:
      - id: docker-compose-check
        name: Check docker-compose files
        files: ^docker-compose

  # Security checks
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.4
    hooks:
      - id: forbid-crlf
        name: Check for CRLF line endings
      - id: forbid-tabs
        name: Check for tabs

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.37.0
    hooks:
      - id: markdownlint
        name: Lint Markdown
        files: \.md$
        exclude: node_modules

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: [mypy, eslint]  # Skip slow checks in CI
  submodules: false
